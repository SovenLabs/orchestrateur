# Tests rapides par défaut + suite sécurité/charge sur main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Tests rapides
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --workspace
      - name: cargo test (défaut)
        run: cargo test --workspace
      - name: cargo test phase7
        run: |
          cargo test -p orchestrator --test phase7_agent_loop
          cargo test -p orchestrator --test integration_multi_agents_b212
          cargo test -p cortex --test property
      - name: validate skills schema (P6 workspace fixture)
        run: cargo test -p orchestrator workspace_fixture
      - name: clippy cortex
        run: cargo clippy -p cortex -- -D warnings
      - name: clippy orchestrator
        run: cargo clippy -p orchestrator -- -D warnings
      - name: clippy infrastructure
        run: cargo clippy -p infrastructure -- -D warnings
      - name: clippy orchestrateur-cli
        run: cargo clippy -p orchestrateur-cli --features gateway,websocket-server -- -D warnings
      - name: clippy orchestrateur-plugins
        run: cargo clippy -p orchestrateur-plugins -- -D warnings
      - name: clippy shared-types
        run: cargo clippy -p shared-types -- -D warnings
      - name: clippy mcp
        run: cargo clippy -p mcp -- -D warnings
      - name: build install CLI (zero warnings)
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo build -p orchestrateur-cli --bin orch --features gateway,websocket-server --release
      - name: cargo test daemon (websocket-server)
        run: cargo test -p orchestrator --features websocket-server daemon_integration daemon_ws_live
      - name: cargo test gateway
        run: cargo test -p orchestrator --features gateway gateway_integration
      - name: desktop vitest
        run: |
          cd apps/tauri-desktop
          npm ci
          npm test

  test-heavy:
    name: Tests sécurité et charge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --ignored
        run: cargo test --workspace -- --ignored
      - name: cargo test heavy-tests (cortex)
        run: cargo test -p cortex --features heavy-tests