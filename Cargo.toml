[workspace]
resolver = "2"
members = [
    "crates/cortex",
    "crates/orchestrator",
    "crates/infrastructure",
    "crates/cli",
]
default-members = [
    "crates/cortex",
    "crates/orchestrator",
    "crates/infrastructure",
    "crates/cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Sovën"]
license = "MIT OR Apache-2.0"
rust-version = "1.75"
description = "Orchestrateur — Second cerveau local souverain (Cortex + Esprit + Peau)"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
cortex = { path = "crates/cortex" }
orchestrator = { path = "crates/orchestrator" }
infrastructure = { path = "crates/infrastructure" }
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tracing = "0.1"
uuid = { version = "1", features = ["v7", "serde"] }